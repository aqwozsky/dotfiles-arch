general {
    hide_cursor = true
    grace = 2
    disable_loading_bar = true
}

background {
    monitor =
    path = /home/baris/wallpapers/background.jpg
    blur_passes = 4
    blur_size = 8
    noise = 0.012
    contrast = 1.08
    brightness = 0.78
    vibrancy = 0.22
    vibrancy_darkness = 0.15
}

# Büyük saat
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(235, 240, 255, 1.0)
    font_size = 86
    font_family = JetBrainsMono Nerd Font
    position = 0, 140
    halign = center
    valign = center
}

# Tarih
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(180, 190, 220, 0.9)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 78
    halign = center
    valign = center
}

# Küçük üst açıklama
label {
    monitor =
    text = secure session
    color = rgba(150, 160, 190, 0.75)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 32
    halign = center
    valign = center
}


# Şifre kutusu
input-field {
    monitor =
    size = 360, 64
    position = 0, -155
    halign = center
    valign = center

    outline_thickness = 2
    rounding = 22

    outer_color = rgba(120, 140, 255, 0.30)
    inner_color = rgba(14, 18, 30, 0.72)
    font_color = rgba(235, 240, 255, 1.0)

    check_color = rgba(120, 140, 255, 0.95)
    fail_color = rgba(255, 110, 140, 0.95)
    capslock_color = rgba(255, 210, 127, 0.95)

    fade_on_empty = false
    placeholder_text = <span foreground="##94a3b8">Password...</span>
    hide_input = false

    dots_center = true
    dots_size = 0.2
    dots_spacing = 0.28

    fail_text = <span foreground="##ff8ea3">wrong password</span>
}

# Alt bilgi
label {
    monitor =
    text = press Enter to unlock
    color = rgba(150, 160, 190, 0.72)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -215
    halign = center
    valign = center
}
